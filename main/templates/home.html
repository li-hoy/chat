<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>chat</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/base.css' %}">
</head>
<body>
    {% if user.is_authenticated %}
        <header>
            <div id="logo" class="panel">chat</div>
            <div id="person"></div>
        </header>
        <main>
            <div id="chat"></div>
            <div id="contacts" class="panel"></div>
        </main>
        <footer>
        </footer>
    {% else %}
        <main>
            <div class="login-panel-wrapper">
                <div class="panel login-panel">
                    <form method="post" class="login-form">
                        {% csrf_token %}
                        <div class="form-error">{{ form.non_field_errors }}</div>
                        <table>
                        {% for f in form %}
                            <tr>
                                <th><label for="{{ f.id_for_label }}">{{f.label}}: </label></th>
                                <td>{{ f }}</td>
                                <td class="form-error">{{ f.errors }}</td>
                            </tr>
                        {% endfor %}
                        </table>
                        <div class="login-form-buttons">
                            <button type="submit" formaction="/users/login/">Войти</button>
                            <span>|</span>
                            <button type="submit" formaction="/users/registration/">Регистрация</button>
                        </div>
                    </form>
                </div>
            </div>
        </main>
    {% endif %}

    {% if user.is_authenticated %}
    <script src="https://cdn.jsdelivr.net/npm/vue/dist/vue.js"></script>
    
    <script>
        const shared_data = {
            me : {
                id: {{ user.id }},
                name: '{{ user.username }}',
            },
            current_recipient_id: null,
            message_feed: [],
            chats: {},
            contacts: [],
        };

        const chat = new Vue({
            delimiters: ['[[', ']]'],
            el: '#chat',
            data: {
                message: '',
                shared: shared_data,
            },
            methods: {
                load: async function () {
                    let response = await fetch('/contacts');

                    if (response.ok) {
                        shared_data.contacts = (await response.json()).contacts;
                    } else {
                        console.error("Ошибка HTTP: " + response.status);
                    }
                },
                send: async function ($event) {
                    this.message = '';

                    const input = $event.target
                        .parentElement
                        .querySelector('input');

                    let response = await fetch('/messages/add/', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json; charset=utf-8',
                        },
                        body: JSON.stringify({
                            recipient_id: this.shared.current_recipient_id,
                            text: input.value,
                            csrfmiddlewaretoken: document.querySelector('[name=csrfmiddlewaretoken]').value,
                        })
                    });

                    if (response.ok) {
                        shared_data.chats[shared_data.current_recipient_id] = (await response.json()).messages;
                    } else {
                        console.error("Ошибка HTTP: " + response.status);
                    }
                },
            },
            computed: {
                isSendButtonDisabled: function() {
                    return (this.message === '' || this.shared.current_recipient_id < 1);
                },
                resultMessageFeed() {
                    return this.shared.chats[this.shared.current_recipient_id];
                },
            },
            template: `
                <div id="chat">
                    <div id="message-feed">
                        <div
                            v-bind:class="[
                                'message',
                                {
                                    'message-self': (message.sender_id === shared.me.id),
                                }
                            ]"
                            v-for="message in resultMessageFeed"
                        >
                            [[message.text]]
                        </div>
                    </div>
                    <div id="message-panel" class="panel input-panel">
                        <div class="input-wrapper">
                            <input
                                type="text"
                                v-model="message"
                                @keyup.enter="send($event)"
                                value=""
                                placeholder="введите сообщение"
                            />
                        </div>
                        {% csrf_token %}
                        <button
                            @click="send($event)"
                                {% if user.is_authenticated %}
                                :disabled="isSendButtonDisabled"
                            {% else %}
                                disabled
                            {% endif %}
                        >send</button>
                    </div>
                </div>
            `
        });

        const contacts = new Vue({
            delimiters: ['[[', ']]'],
            el: '#contacts',
            data: {
                shared: shared_data,
                search_text: null,
            },
            created: function () {
                this.load();
            },
            methods: {
                load: function () {
                    const self = this;

                    fetch('/contacts')
                        .then(response => {
                            if (response.ok) {
                                response
                                    .json()
                                    .then(result => {
                                        self.shared.contacts = result.contacts;
                                    })
                            } else {
                                console.error("Ошибка HTTP: " + response.status);
                            }
        
                            // axios.get('/contacts')
                            //     .then((response) => console.log(response))
                            //    .catch((error) => console.log(error));
        
                        });
                },
                select: function ($event) {
                    current_recipient_id = parseInt($event.target.getAttribute('data-contact-id'));

                    shared = this.shared;

                    fetch('/messages/' + current_recipient_id + '/')
                        .then(response => {
                            if (response.ok) {
                                response.json().then(data => {
                                    shared.current_recipient_id = current_recipient_id;
                                    shared.chats[shared.current_recipient_id] = data.messages;
                                })
                            } else {
                                console.error("Ошибка HTTP: " + response.status);
                            }
                        });
                },
            },
            computed: {
                resultContactList() {
                    if (this.search_text) {
                        return this.shared.contacts.filter(
                            (contact) => contact.name
                                .toLowerCase()
                                .includes(this.search_text.toLowerCase())
                        );
                    } else {
                        return this.shared.contacts;
                    }
                }
            },
            template: `
                <div id="contacts" class="panel">
                    <div id="search-contact-panel" class="input-panel">
                        <div class="input-wrapper">
                            <input type="text" v-model="search_text" placeholder="поиск по контактам" />
                        </div>
                    </div>
                    <div id="contact-list">
                        <div
                            v-bind:class="[
                                'contact',
                                {
                                    'contact-selected': (contact.id === shared.current_recipient_id),
                                }
                            ]"
                            v-for="contact in resultContactList"
                            @click="select($event)"
                            :data-contact-id="contact.id"
                            :data-current-recipient-id="shared.current_recipient_id"
                        >
                            [[contact.name]]
                        </div>
                    </div>
                </div>
            `
        });

        const person_panel = new Vue({
            delimiters: ['[[', ']]'],
            el: '#person',
            template: `
                <div id="person" class="panel">
                    {% if user.is_authenticated %}
                        <button onclick="location.href='{% url 'users:logout' %}'">Выйти</button>
                    {% endif %}
                </div>
            `
        })

    </script>
{% endif %}
    
</body>
</html>
